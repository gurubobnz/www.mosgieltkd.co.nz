{% assign navs = site.data.nav %}
<nav class="navbar navbar-expand-lg navbar-light bg-white" style="position: sticky; top: 0;">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/">Mosgiel Taekwon-Do</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto">
        {% for nav in navs %}
        <li class="nav-item {% if page.url == nav.url or page.url contains nav.url and nav.url != '/' %}active{% endif %}">
          <a class="nav-link {{ nav.classes }}" href="{{ nav.url }}"{% if nav.target %} target="{{ nav.target }}"{% endif %}>
            {{ nav.title }}
            {% if page.url == nav.url %}<span class="sr-only">(current)</span>{% endif %}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>
