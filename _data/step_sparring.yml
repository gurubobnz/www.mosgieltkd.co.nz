    - A: Walking stance punch
      D: Rear foot stance upward block
      C: Flying turning kick
    - A: Walking stance flat fingertip thrust
      D: ~
      C: Flying front snap kick
    - A: Side turning kick
      D: Dodge to forearm guarding block
      C: Flying side piercing kick (front foot)

- title: One step sparring
  grades: Red stripe to Red belt
  type: 1-step
  color: red
  sequences:
    - A: Walking stance punch
      D: Hooking kick
      C: Flying inward vertical kick
    - A: Walking stance upset fingertip thrust
      D: Dodge to knifehand low guarding block
      C: Flying back piercing kick
    - A: Side piercing kick
      D: Crescent kick
      C: Flying reverse turning kick

- title: One step sparring
  grades: Red belt to Black stripe
  type: 1-step
  color: red-black
  sequences:
    - A: Walking stance punch
      D: L-stance palm downward block
      C: Flying reverse hooking kick (front foot)
    - A: Walking stance flat fingertip thrust
      D: Dodge to L-stance guarding block
      C: Mid-air kick
    - A: Back piercing kick
      D: ~
