---
layout: default
title: Grading Quiz
---

<div class="container pb-5">
  <h1>Grading Quiz</h1>
  <p class="lead">Test your Taekwon-Do knowledge with multi-choice questions.</p>

  <!-- ===== SETUP SCREEN ===== -->
  <div id="setup-screen">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title">Quiz Settings</h4>
        <div class="form-row">
          <div class="form-group col-sm-6">
            <label for="min-rank">From rank <small class="text-muted">(lowest to include)</small></label>
            <select class="form-control" id="min-rank"></select>
          </div>
          <div class="form-group col-sm-6">
            <label for="max-rank">To rank <small class="text-muted">(highest to include)</small></label>
            <select class="form-control" id="max-rank"></select>
          </div>
        </div>
        <div class="form-group">
          <label>Quiz mode</label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="mode" id="mode-20" value="20" checked>
              <label class="form-check-label" for="mode-20">20 questions</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="mode" id="mode-endless" value="endless">
              <label class="form-check-label" for="mode-endless">Endless</label>
            </div>
          </div>
        </div>
        <div class="form-group mb-0">
          <label>Questions</label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="compulsory" id="comp-all" value="all" checked>
              <label class="form-check-label" for="comp-all">All questions</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="compulsory" id="comp-only" value="compulsory">
              <label class="form-check-label" for="comp-only">Compulsory only</label>
            </div>
          </div>
        </div>
        <div id="setup-error" class="alert alert-warning d-none"></div>
        <button class="btn btn-quiz" id="start-btn">Start Quiz</button>
      </div>
    </div>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quiz-screen" class="d-none">

    <div class="d-flex justify-content-between align-items-center mb-2">
      <span id="progress-text" class="font-weight-bold"></span>
      <span id="score-text" class="text-muted"></span>
    </div>
    <div class="progress mb-3" id="progress-bar-wrap" style="height:8px">
      <div class="progress-bar bg-quiz" id="progress-bar" role="progressbar" style="width:0%"></div>
    </div>

    <div class="mb-2">
      <span class="rank-badge" id="rank-badge"></span>
    </div>

    <div class="card mb-3 shadow-sm">
      <div class="card-body">
        <p class="question-text mb-0" id="question-text"></p>
      </div>
    </div>

    <div id="options-container" class="mb-3"></div>

    <div id="feedback" class="alert d-none mb-3"></div>

    <div class="d-flex gap-2 mb-4">
      <div class="d-flex justify-content-between flex-grow-1">
        <div>
          <button class="btn btn-quiz d-none" id="next-btn">Next Question &rarr;</button>
          <button class="btn btn-outline-secondary d-none" id="finish-btn">Finish Quiz</button>
        </div>
        <button class="btn btn-quiz btn-outline-danger" id="abort-btn">Abort Quiz</button>
      </div>
    </div>

    <div id="history-wrap" class="d-none">
      <h5>Progress so far</h5>
      <div class="d-flex progress-summary">
        <div class="progress-stat"><span id="ps-asked">0</span><small>Asked</small></div>
        <div class="progress-stat ps-correct"><span id="ps-correct">0</span><small>Correct</small></div>
        <div class="progress-stat ps-wrong"><span id="ps-wrong">0</span><small>Wrong</small></div>
        <div class="progress-stat ps-pct"><span id="ps-pct">-</span><small>Score</small></div>
      </div>
    </div>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="results-screen" class="d-none">
    <div class="card mb-4 shadow-sm">
      <div class="card-body text-center py-4">
        <h2 id="results-title"></h2>
        <div class="row justify-content-center mt-3">
          <div class="col-4 col-sm-3">
            <div class="stat-box stat-correct">
              <div class="stat-num" id="stat-correct">0</div>
              <div class="stat-label">Correct</div>
            </div>
          </div>
          <div class="col-4 col-sm-3">
            <div class="stat-box stat-wrong">
              <div class="stat-num" id="stat-wrong">0</div>
              <div class="stat-label">Wrong</div>
            </div>
          </div>
          <div class="col-4 col-sm-3">
            <div class="stat-box stat-total">
              <div class="stat-num" id="stat-total">0</div>
              <div class="stat-label">Total</div>
            </div>
          </div>
        </div>
        <div class="display-4 mt-3 font-weight-bold" id="stat-pct" style="color:#800"></div>
      </div>
    </div>

    <h4>Full Question Breakdown</h4>
    <div id="results-breakdown" class="mb-4"></div>

    <button class="btn btn-quiz" id="restart-btn">Try Again</button>
  </div>
</div>

<style>
.btn-quiz {
  margin-top: 12px;
  background-color: #800;
  color: #fff !important;
  border-color: #800;
}
.btn-quiz:hover, .btn-quiz:focus {
  background-color: #600;
  border-color: #600;
  color: #fff;
}
.bg-quiz { background-color: #800 !important; }

.rank-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.8rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

.question-text {
  font-size: 1.15rem;
  line-height: 1.5;
}

.quiz-option {
  display: flex;
  align-items: center;
  width: 100%;
  text-align: left;
  padding: 10px 14px;
  margin-bottom: 8px;
  border: 2px solid #dee2e6;
  border-radius: 6px;
  background: #fff;
  font-size: 1rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.quiz-option:hover:not(:disabled) {
  border-color: #800;
  background: #fff5f5;
}
.quiz-option .opt-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #dee2e6;
  color: #555;
  font-weight: bold;
  font-size: 0.85rem;
  flex-shrink: 0;
  margin-right: 12px;
  transition: background 0.15s, color 0.15s;
}
.quiz-option.correct {
  border-color: #28a745;
  background: #f0fff4;
}
.quiz-option.correct .opt-letter {
  background: #28a745;
  color: #fff;
}
.quiz-option.wrong {
  border-color: #dc3545;
  background: #fff5f5;
}
.quiz-option.wrong .opt-letter {
  background: #dc3545;
  color: #fff;
}
.quiz-option:disabled {
  cursor: default;
  opacity: 0.85;
}

.stat-box {
  border-radius: 8px;
  padding: 12px 8px;
  margin: 0 4px;
}
.stat-correct { background: #d4edda; }
.stat-wrong   { background: #f8d7da; }
.stat-total   { background: #e2e3e5; }
.stat-num  { font-size: 2rem; font-weight: bold; line-height: 1; }
.stat-label { font-size: 0.8rem; margin-top: 2px; }

.result-card {
  border: 1px solid #dee2e6;
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.result-card.r-correct { border-left: 4px solid #28a745; }
.result-card.r-wrong   { border-left: 4px solid #dc3545; }
.result-card .r-q { font-weight: 600; margin-bottom: 4px; }
.result-card .r-detail { font-size: 0.9rem; }

.progress-summary {
  gap: 12px;
  flex-wrap: wrap;
}
.progress-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f8f9fa;
  border: 1px solid #dee2e6;
  border-radius: 6px;
  padding: 10px 20px;
  min-width: 70px;
}
.progress-stat span { font-size: 1.6rem; font-weight: bold; line-height: 1; }
.progress-stat small { font-size: 0.75rem; color: #666; margin-top: 2px; }
.ps-correct { border-color: #c3e6cb; background: #d4edda; }
.ps-correct span { color: #155724; }
.ps-wrong   { border-color: #f5c6cb; background: #f8d7da; }
.ps-wrong span   { color: #721c24; }
.ps-pct     { border-color: #bee5eb; background: #d1ecf1; }
.ps-pct span     { color: #0c5460; }

.gap-2 { gap: 0.5rem; }
</style>

<script>
fetch('/js/quiz-questions.json')
  .then(function (r) { return r.json(); })
  .then(init)
  .catch(function () {
    document.getElementById('setup-screen').innerHTML =
      '<div class="alert alert-danger">Could not load quiz questions.</div>';
  });

function init(Q) {
  'use strict';

  var RANKS = [
    { idx:  0, label: '10th gup - White belt',      bg: '#aaa' },
    { idx:  1, label: '9th gup - Yellow stripe',      bg: '#b8970a' },
    { idx:  2, label: '8th gup - Yellow belt',   bg: 'linear-gradient(90deg,#b8970a 80%,#2a7a3b 80%)' },
    { idx:  3, label: '7th gup - Green stripe',       bg: '#2a7a3b' },
    { idx:  4, label: '6th gup - Green belt',     bg: 'linear-gradient(90deg,#2a7a3b 80%,#1a5fa8 80%)' },
    { idx:  5, label: '5th gup - Blue stripe',        bg: '#1a5fa8' },
    { idx:  6, label: '4th gup - Blue belt',       bg: 'linear-gradient(90deg,#1a5fa8 80%,#b82222 80%)' },
    { idx:  7, label: '3rd gup - Red stripe',         bg: '#b82222' },
    { idx:  8, label: '2nd gup - Red belt',      bg: 'linear-gradient(90deg,#b82222 80%,#222 80%)' },
    { idx:  9, label: '1st gup - Black stripe',        bg: 'linear-gradient(90deg,#8b1111 80%,#111 80%)' },
    { idx: 10, label: '1st dan - Black belt',       bg: '#111' },
    { idx: 11, label: '2nd dan - Black belt',       bg: '#111' },
    { idx: 12, label: '3rd dan - Black belt',       bg: '#111' }
  ];

  /* ---- State ---- */
  var pool = [], history = [], currentIdx = 0, endless = false;
  var ALL_QUESTIONS = Q;

  /* ---- DOM refs ---- */
  var setupScreen   = document.getElementById('setup-screen');
  var quizScreen    = document.getElementById('quiz-screen');
  var resultsScreen = document.getElementById('results-screen');
  var minRankSel    = document.getElementById('min-rank');
  var maxRankSel    = document.getElementById('max-rank');
  var setupError    = document.getElementById('setup-error');
  var progressText  = document.getElementById('progress-text');
  var scoreText     = document.getElementById('score-text');
  var progressBar   = document.getElementById('progress-bar');
  var progressBarWrap = document.getElementById('progress-bar-wrap');
  var rankBadge     = document.getElementById('rank-badge');
  var questionText  = document.getElementById('question-text');
  var optsCont      = document.getElementById('options-container');
  var feedback      = document.getElementById('feedback');
  var nextBtn       = document.getElementById('next-btn');
  var finishBtn     = document.getElementById('finish-btn');
  var historyWrap   = document.getElementById('history-wrap');
  var psAsked       = document.getElementById('ps-asked');
  var psCorrect     = document.getElementById('ps-correct');
  var psWrong       = document.getElementById('ps-wrong');
  var psPct         = document.getElementById('ps-pct');

  /* ---- Populate rank selects ---- */
  RANKS.forEach(function (r) {
    var o1 = new Option(r.label, r.idx);
    var o2 = new Option(r.label, r.idx);
    minRankSel.add(o1);
    maxRankSel.add(o2);
  });
  maxRankSel.value = 9;

  /* ---- Helpers ---- */
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function show(el)  { el.classList.remove('d-none'); }
  function hide(el)  { el.classList.add('d-none'); }

  function buildPool(minIdx, maxIdx, compulsoryOnly) {
    var filtered = ALL_QUESTIONS.filter(function (q) {
      return q.r >= minIdx && q.r <= maxIdx && (!compulsoryOnly || q.compulsory);
    });
    return shuffle(filtered);
  }

  /* ---- Start ---- */
  document.getElementById('start-btn').addEventListener('click', function () {
    var minIdx = parseInt(minRankSel.value, 10);
    var maxIdx = parseInt(maxRankSel.value, 10);
    if (minIdx > maxIdx) {
      show(setupError);
      setupError.textContent = 'The "From" rank must be lower than the "To" rank.';
      return;
    }
    var compulsoryOnly = document.querySelector('input[name="compulsory"]:checked').value === 'compulsory';
    var filtered = ALL_QUESTIONS.filter(function (q) {
      return q.r >= minIdx && q.r <= maxIdx && (!compulsoryOnly || q.compulsory);
    });
    if (filtered.length === 0) {
      show(setupError);
      setupError.textContent = 'No questions found for the selected rank range' +
        (compulsoryOnly ? ' with compulsory questions only' : '') + '.';
      return;
    }
    hide(setupError);

    endless = document.querySelector('input[name="mode"]:checked').value === 'endless';
    pool = buildPool(minIdx, maxIdx, compulsoryOnly);
    if (!endless && pool.length > 20) pool = pool.slice(0, 20);
    history = [];
    currentIdx = 0;

    hide(setupScreen);
    show(quizScreen);
    if (endless) hide(progressBarWrap);
    else show(progressBarWrap);

    renderQuestion();
  });

  /* ---- Render question ---- */
  function renderQuestion() {
    if (!endless && currentIdx >= pool.length) {
      showResults();
      return;
    }

    // In endless mode, loop the pool
    if (endless && currentIdx >= pool.length) {
      var minIdx = parseInt(minRankSel.value, 10);
      var maxIdx = parseInt(maxRankSel.value, 10);
      pool = buildPool(minIdx, maxIdx);
      currentIdx = 0;
    }

    var item = pool[currentIdx];
    var rank = RANKS[item.r];
    var total = pool.length;
    var num = history.length + 1;
    var correct = history.filter(function (h) { return h.correct; }).length;

    // Progress
    if (endless) {
      progressText.textContent = 'Question ' + num;
    } else {
      progressText.textContent = 'Question ' + num + ' of ' + total;
      progressBar.style.width = (((num - 1) / total) * 100) + '%';
    }
    var pct = history.length ? Math.round((correct / history.length) * 100) : 0;
    scoreText.textContent = correct + ' / ' + history.length + (history.length ? ' (' + pct + '%)' : '');

    // Rank badge
    rankBadge.textContent = rank.label;
    rankBadge.style.background = rank.bg;

    // Question
    questionText.textContent = item.q;

    // Options - shuffle display order but track which is correct
    var letters = ['A', 'B', 'C', 'D'];
    var indices = shuffle([0, 1, 2, 3]);
    optsCont.innerHTML = '';
    indices.forEach(function (origIdx, displayPos) {
      var btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.setAttribute('data-orig', origIdx);
      btn.innerHTML = '<span class="opt-letter">' + letters[displayPos] + '</span>' +
                      '<span>' + item.opts[origIdx] + '</span>';
      btn.addEventListener('click', function () { handleAnswer(origIdx, item.ans, indices); });
      optsCont.appendChild(btn);
    });

    // Hide feedback & next
    hide(feedback);
    hide(nextBtn);
    hide(finishBtn);
  }

  /* ---- Handle answer ---- */
  function handleAnswer(chosen, correct, indices) {
    // Disable all buttons
    var btns = optsCont.querySelectorAll('.quiz-option');
    btns.forEach(function (b) {
      b.disabled = true;
      var origIdx = parseInt(b.getAttribute('data-orig'), 10);
      if (origIdx === correct) b.classList.add('correct');
      else if (origIdx === chosen) b.classList.add('wrong');
    });

    var isCorrect = chosen === correct;
    history.push({ q: pool[currentIdx], chosen: chosen, correct: correct, isCorrect: isCorrect });

    // Feedback
    feedback.className = 'alert ' + (isCorrect ? 'alert-success' : 'alert-danger');
    feedback.innerHTML = isCorrect
      ? '<strong>Correct!</strong>'
      : '<strong>Incorrect.</strong> The correct answer is: <strong>' +
          pool[currentIdx].opts[correct] + '</strong>';
    show(feedback);

    // Update running score display and summary
    var c = history.filter(function (h) { return h.isCorrect; }).length;
    var w = history.length - c;
    var pct = Math.round((c / history.length) * 100);
    scoreText.textContent = c + ' / ' + history.length + ' (' + pct + '%)';
    psAsked.textContent   = history.length;
    psCorrect.textContent = c;
    psWrong.textContent   = w;
    psPct.textContent     = pct + '%';
    show(historyWrap);

    currentIdx++;
    show(nextBtn);
    if (endless) show(finishBtn);

    if (!endless && currentIdx >= pool.length) {
      nextBtn.textContent = 'See Results';
    }
  }

  /* ---- Next button ---- */
  nextBtn.addEventListener('click', function () {
    if (!endless && currentIdx >= pool.length) {
      showResults();
    } else {
      renderQuestion();
    }
  });

  /* ---- Finish button (endless) ---- */
  finishBtn.addEventListener('click', showResults);

  /* ---- Show results ---- */
  function showResults() {
    hide(quizScreen);
    show(resultsScreen);

    var total = history.length;
    var correct = history.filter(function (h) { return h.isCorrect; }).length;
    var wrong = total - correct;
    var pct = total ? Math.round((correct / total) * 100) : 0;

    var titles = ['Keep practising!', 'Getting there!', 'Good effort!', 'Well done!', 'Excellent!', 'Outstanding!'];
    var titleIdx = Math.min(Math.floor(pct / 20), titles.length - 1);
    document.getElementById('results-title').textContent = titles[titleIdx];
    document.getElementById('stat-correct').textContent = correct;
    document.getElementById('stat-wrong').textContent = wrong;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pct').textContent = pct + '%';

    var bd = document.getElementById('results-breakdown');
    bd.innerHTML = '';
    history.forEach(function (h, i) {
      var div = document.createElement('div');
      div.className = 'result-card ' + (h.isCorrect ? 'r-correct' : 'r-wrong');
      var chosenText = h.q.opts[h.chosen];
      var correctText = h.q.opts[h.correct];
      div.innerHTML = '<div class="r-q">' + (i + 1) + '. ' + h.q.q + '</div>' +
        '<div class="r-detail">' +
          (h.isCorrect
            ? '<span class="text-success">✓ ' + correctText + '</span>'
            : '<span class="text-danger">✗ You answered: ' + chosenText + '</span>' +
              ' &nbsp;|&nbsp; <span class="text-success">Correct: ' + correctText + '</span>'
          ) +
        '</div>';
      bd.appendChild(div);
    });
  }

  /* ---- Restart ---- */
  document.getElementById('restart-btn').addEventListener('click', function () {
    hide(resultsScreen);
    hide(historyWrap);
    show(setupScreen);
  });

  document.getElementById('abort-btn').addEventListener('click', function () {
    hide(quizScreen);
    hide(historyWrap);
    show(setupScreen);
  });

}
</script>
